spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/ticketflow
    username: ticketflow
    password: ticketflow
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8081

logging:
  level:
    org.springframework.security: DEBUG